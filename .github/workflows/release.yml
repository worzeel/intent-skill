name: release

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) to cross-compile the
# single-file `intent` binary for every platform and attach the skill archives.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --timeout 20000

      - name: Build release archives (all targets)
        run: bun run bundle --release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/intent-skill-*.tar.gz
            release/intent-skill-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
