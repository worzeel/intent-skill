name: release

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) to cross-compile the
# single-file `intent` binary for every platform and attach the skill archives.
# On pull requests the same build/test/package runs as a dry run (and uploads the
# archives as a PR artifact) — only a tag push actually publishes a Release.
on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --timeout 20000

      - name: Build release archives (all targets)
        run: bun run bundle --release

      # On PRs / manual runs: upload the archives so you can download + smoke-test
      # them before merging. Doesn't publish anything.
      - name: Upload archives as artifact (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: intent-skill-archives
          path: |
            release/intent-skill-*.tar.gz
            release/intent-skill-*.zip
          if-no-files-found: error

      # Only a tag push (refs/tags/v*) actually publishes a GitHub Release.
      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/intent-skill-*.tar.gz
            release/intent-skill-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
